name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - claude/nunez-sons-plumbing-site-o1gap4
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Tries to enable Pages automatically. If this step fails with a 403
          # ("Resource not accessible by integration"), enable Pages once by
          # hand: Settings -> Pages -> Build and deployment -> Source:
          # "GitHub Actions", then re-run this workflow.
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: nunez-sons-plumbing
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
